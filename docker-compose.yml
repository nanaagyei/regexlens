services:
  postgres:
    image: postgres:16-alpine
    container_name: regexlens-db
    environment:
      POSTGRES_USER: regexlens
      POSTGRES_PASSWORD: regexlens_dev
      POSTGRES_DB: regexlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regexlens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
