# Optional: deploy the Nextra site in docs/ to GitHub Pages (static export).
# Requires: Repo Settings → Pages → Source: GitHub Actions.
#
# Asset URLs: project sites are served at https://USER.github.io/REPO/, so Next.js
# needs basePath=/REPO for CSS/JS to load (see docs/next.config.mjs, GH_PAGES_BASEPATH).
# For a root custom domain only, set repo variable DOCS_USE_ROOT_ASSET_PATHS=true — see DEPLOYMENT.md §6b.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set GitHub Pages base path for static assets
        run: |
          if [ "${{ vars.DOCS_USE_ROOT_ASSET_PATHS }}" = "true" ]; then
            echo "GH_PAGES_BASEPATH=(root — custom domain layout; github.io/REPO may lack CSS)"
            echo "GH_PAGES_BASEPATH=" >> "$GITHUB_ENV"
          else
            echo "GH_PAGES_BASEPATH=/${{ github.event.repository.name }}"
            echo "GH_PAGES_BASEPATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install and build docs
        working-directory: docs
        env:
          GITHUB_PAGES: "1"
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
